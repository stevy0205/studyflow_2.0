<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyFlow – Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:  #fdf8f0;
      --yellow: #ffd60a;
      --coral:  #ff6b6b;
      --mint:   #06d6a0;
      --blue:   #118ab2;
      --purple: #845ec2;
      --navy:   #1a1a2e;
      --ink:    #2d2d2d;
      --muted:  #7a7a8c;
      --white:  #ffffff;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream); color: var(--ink);
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; background: var(--white);
      border-bottom: 3px solid var(--navy);
      position: sticky; top: 0; z-index: 10;
    }
    .logo { font-family: 'Cabin Sketch', cursive; font-size: 1.5rem; font-weight: 700; }

    .nav-links { display: flex; gap: .5rem; align-items: center; }
    .nav-link {
      padding: .45rem .9rem; border-radius: 8px; font-size: .875rem; font-weight: 700;
      text-decoration: none; color: var(--muted); border: 2px solid transparent;
      transition: all .15s;
    }
    .nav-link:hover { color: var(--navy); border-color: var(--navy); }
    .nav-link.active { color: var(--navy); background: var(--yellow); border-color: var(--navy); }

    .btn-coach {
      padding: .5rem 1.2rem; background: var(--navy); color: var(--white);
      border: 2px solid var(--navy); border-radius: 8px;
      font-family: 'Nunito', sans-serif; font-size: .875rem; font-weight: 800;
      cursor: pointer; text-decoration: none;
      box-shadow: 3px 3px 0 var(--coral); transition: all .1s;
    }
    .btn-coach:hover { transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--coral); }

    /* ── Page ── */
    .page { max-width: 1000px; margin: 0 auto; padding: 2.5rem 2rem; }

    .page-header { margin-bottom: 2.5rem; }
    .welcome-tag {
      display: inline-block; background: var(--mint); color: var(--navy);
      font-size: .72rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .1em; padding: .25rem .7rem; border-radius: 4px;
      margin-bottom: .6rem; transform: rotate(-.5deg);
    }
    .page-title {
      font-family: 'Cabin Sketch', cursive; font-size: 2.4rem; color: var(--navy);
    }

    /* ── Stat row ── */
    .stat-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--white);
      border: 2.5px solid var(--navy); border-radius: 14px;
      padding: 1.25rem 1.25rem 1.1rem;
      box-shadow: 4px 4px 0 var(--navy);
      position: relative; overflow: hidden;
    }

    .stat-card::before {
      content: attr(data-emoji);
      position: absolute; right: .75rem; top: .75rem;
      font-size: 1.5rem; opacity: .25;
    }

    .stat-val {
      font-family: 'Cabin Sketch', cursive;
      font-size: 2.2rem; color: var(--navy); line-height: 1;
      margin-bottom: .3rem;
    }
    .stat-lbl { font-size: .78rem; font-weight: 700; color: var(--muted); }

    /* ── Two columns ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }

    /* ── Cards ── */
    .card {
      background: var(--white);
      border: 2.5px solid var(--navy); border-radius: 16px;
      padding: 1.5rem; box-shadow: 4px 4px 0 var(--navy);
    }

    .card-title {
      font-family: 'Cabin Sketch', cursive;
      font-size: 1.25rem; color: var(--navy);
      margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: .5rem;
    }

    /* Area bars */
    .area-row { margin-bottom: 1rem; }
    .area-row:last-child { margin-bottom: 0; }

    .area-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: .4rem;
    }
    .area-name-label { font-size: .875rem; font-weight: 700; }
    .area-score-badge {
      font-size: .72rem; font-weight: 800;
      padding: .2rem .55rem; border-radius: 999px;
    }

    .bar-track {
      height: 10px; border-radius: 99px;
      border: 2px solid var(--navy); overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 99px;
      transition: width 1.2s cubic-bezier(.25,.46,.45,.94);
    }

    /* Method list */
    .method-row {
      display: flex; align-items: center; gap: 1rem;
      padding: .85rem; border-radius: 10px; margin-bottom: .6rem;
      border: 2px solid #e8e5de;
      transition: all .15s;
    }
    .method-row:hover { border-color: var(--navy); transform: translateX(3px); }
    .method-row:last-child { margin-bottom: 0; }

    .mrow-icon {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
      border: 2px solid transparent;
    }
    .mrow-info { flex: 1; }
    .mrow-name { font-size: .9rem; font-weight: 800; }
    .mrow-meta { font-size: .75rem; color: var(--muted); }
    .mrow-badge {
      font-size: .68rem; font-weight: 800; padding: .2rem .6rem;
      border-radius: 999px; white-space: nowrap;
    }

    .btn-start {
      display: inline-flex; align-items: center; gap: .4rem;
      margin-top: 1.25rem; padding: .65rem 1.4rem;
      background: var(--navy); color: var(--white);
      border: 2px solid var(--navy); border-radius: 10px;
      font-family: 'Nunito', sans-serif; font-size: .875rem; font-weight: 800;
      cursor: pointer; text-decoration: none;
      box-shadow: 3px 3px 0 var(--coral); transition: all .1s;
    }
    .btn-start:hover { transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--coral); }

    /* Tips */
    .tip-row {
      display: flex; gap: .75rem; padding: .85rem 0;
      border-bottom: 2px dashed #e8e5de;
    }
    .tip-row:last-child { border-bottom: none; }
    .tip-emoji { font-size: 1.2rem; flex-shrink: 0; }
    .tip-body { font-size: .875rem; line-height: 1.55; }
    .tip-body strong { color: var(--navy); }

    @media (max-width: 768px) {
      .stat-row { grid-template-columns: 1fr 1fr; }
      .two-col  { grid-template-columns: 1fr; }
    }

    /* ── Methoden-Grid ── */
    .methods-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: .25rem;
    }

    .filter-bar {
      display: flex; flex-wrap: wrap; gap: .5rem;
      margin-bottom: 1.25rem;
    }

    .filter-btn {
      padding: .35rem .9rem;
      border: 2px solid var(--navy); border-radius: 999px;
      background: transparent; color: var(--navy);
      font-family: 'Nunito', sans-serif; font-size: .8rem; font-weight: 700;
      cursor: pointer; transition: all .15s;
    }
    .filter-btn.active, .filter-btn:hover {
      color: var(--white);
    }
    .filter-btn[data-area="all"].active     { background: var(--navy); }
    .filter-btn[data-area="prokrastination"].active { background: #845ec2; border-color: #845ec2; }
    .filter-btn[data-area="unterbrechungen"].active { background: #118ab2; border-color: #118ab2; }
    .filter-btn[data-area="leistung"].active        { background: #e07b00; border-color: #e07b00; }
    .filter-btn[data-area="emotion"].active         { background: #ff6b6b; border-color: #ff6b6b; }

    .method-tile {
      background: var(--cream);
      border: 2.5px solid var(--navy); border-radius: 14px;
      padding: 1.1rem;
      cursor: pointer;
      transition: all .15s;
      box-shadow: 3px 3px 0 var(--navy);
      display: flex; flex-direction: column; gap: .5rem;
    }
    .method-tile:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--navy);
    }

    .tile-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; border: 2px solid transparent;
    }
    .tile-name {
      font-size: .875rem; font-weight: 800; color: var(--navy);
      line-height: 1.3;
    }
    .tile-meta {
      font-size: .72rem; color: var(--muted); font-weight: 600;
    }
    .tile-badge {
      display: inline-block; font-size: .65rem; font-weight: 800;
      padding: .18rem .55rem; border-radius: 999px; width: fit-content;
      margin-top: auto;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(26,26,46,.5); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--white);
      border: 3px solid var(--navy); border-radius: 20px;
      padding: 2rem; max-width: 560px; width: 100%;
      max-height: 85vh; overflow-y: auto;
      box-shadow: 8px 8px 0 var(--navy);
      animation: modalIn .25s cubic-bezier(.34,1.56,.64,1);
      position: relative;
    }
    @keyframes modalIn {
      from { opacity:0; transform: scale(.93) translateY(12px); }
      to   { opacity:1; transform: scale(1)   translateY(0); }
    }

    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      width: 32px; height: 32px; border-radius: 8px;
      border: 2px solid var(--navy); background: transparent;
      font-size: 1rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      font-weight: 800; transition: all .1s;
    }
    .modal-close:hover { background: var(--navy); color: var(--white); }

    .modal-header { margin-bottom: 1.25rem; }
    .modal-icon {
      width: 52px; height: 52px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; margin-bottom: .75rem;
      border: 2px solid transparent;
    }
    .modal-title {
      font-family: 'Cabin Sketch', cursive; font-size: 1.6rem; color: var(--navy);
    }
    .modal-subtitle { font-size: .85rem; color: var(--muted); margin-top: .2rem; }

    .modal-section { margin-bottom: 1.1rem; }
    .modal-section-title {
      font-size: .72rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .1em; color: var(--muted); margin-bottom: .5rem;
    }
    .modal-section p { font-size: .875rem; line-height: 1.6; }
    .modal-section ul {
      list-style: none; display: flex; flex-direction: column; gap: .35rem;
    }
    .modal-section ul li {
      font-size: .875rem; padding-left: 1.1rem; position: relative; line-height: 1.5;
    }
    .modal-section ul li::before {
      content: '→'; position: absolute; left: 0; color: var(--muted); font-size: .75rem;
    }
    .modal-steps { display: flex; flex-direction: column; gap: .5rem; }
    .modal-step {
      display: flex; gap: .75rem; align-items: flex-start;
    }
    .step-num {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 800; color: var(--white);
      border: 2px solid transparent;
    }
    .step-text { font-size: .875rem; line-height: 1.5; padding-top: 3px; }

    .modal-cta {
      display: flex; align-items: center; gap: .4rem;
      margin-top: 1.5rem; padding: .7rem 1.4rem;
      background: var(--navy); color: var(--white);
      border: 2px solid var(--navy); border-radius: 10px;
      font-family: 'Nunito', sans-serif; font-size: .875rem; font-weight: 800;
      cursor: pointer; text-decoration: none;
      box-shadow: 3px 3px 0 var(--coral); transition: all .1s;
    }
    .modal-cta:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--coral); }
  </style>
</head>
<body>

<nav>
  <div class="logo">StudyFlow</div>
  <div class="nav-links">
    <a href="/dashboard" class="nav-link active">Dashboard</a>
    <a href="/chat" class="nav-link">Coach</a>
    <a href="/" class="nav-link" onclick="sessionStorage.clear()">Abmelden</a>
  </div>
  <a href="/chat" class="btn-coach">Coach öffnen →</a>
</nav>

<div class="page">
  <div class="page-header">
    <div class="welcome-tag" id="welcome-tag">✨ Dein Lernprofil</div>
    <h1 class="page-title" id="page-title">Guten Tag!</h1>
  </div>

  <!-- Stats -->
  <div class="stat-row">
    <div class="stat-card" data-emoji="🏆">
      <div class="stat-val" id="s-area">–</div>
      <div class="stat-lbl">Hauptbereich</div>
    </div>
    <div class="stat-card" data-emoji="🎯">
      <div class="stat-val" id="s-methods">–</div>
      <div class="stat-lbl">Empfohlene Methoden</div>
    </div>
    <div class="stat-card" data-emoji="📊">
      <div class="stat-val" id="s-avg">–</div>
      <div class="stat-lbl">Ø Bereichs-Score</div>
    </div>
    <div class="stat-card" data-emoji="✅">
      <div class="stat-val">24</div>
      <div class="stat-lbl">Fragen beantwortet</div>
    </div>
  </div>

  <div class="two-col">
    <!-- Area chart -->
    <div class="card">
      <div class="card-title">📊 Bereichs-Analyse</div>
      <div id="area-chart"></div>
    </div>

    <!-- Methods -->
    <div class="card">
      <div class="card-title">🎯 Deine Methoden</div>
      <div id="methods-list"></div>
      <a href="/chat" class="btn-start">Session starten 🚀</a>
    </div>
  </div>

  <!-- Tips -->
  <div class="card">
    <div class="card-title">💡 Tipps für dich</div>
    <div id="tips"></div>
  </div>

  <!-- Alle Methoden -->
  <div class="card" style="margin-top:1.25rem">
    <div class="card-title">📖 Alle Lernmethoden</div>
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" data-area="all" onclick="filterMethods('all')">Alle</button>
      <button class="filter-btn" data-area="prokrastination" onclick="filterMethods('prokrastination')" style="border-color:#845ec2;color:#845ec2">⏳ Prokrastination</button>
      <button class="filter-btn" data-area="unterbrechungen" onclick="filterMethods('unterbrechungen')" style="border-color:#118ab2;color:#118ab2">🎯 Unterbrechungen</button>
      <button class="filter-btn" data-area="leistung"        onclick="filterMethods('leistung')"        style="border-color:#e07b00;color:#e07b00">📚 Leistung</button>
      <button class="filter-btn" data-area="emotion"         onclick="filterMethods('emotion')"         style="border-color:#ff6b6b;color:#ff6b6b">💪 Emotion</button>
    </div>
    <div class="methods-grid" id="all-methods-grid">
      <div style="color:var(--muted);font-size:.875rem">Lädt Methoden...</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-header">
      <div class="modal-icon" id="m-icon"></div>
      <div class="modal-title" id="m-title"></div>
      <div class="modal-subtitle" id="m-subtitle"></div>
    </div>
    <div id="m-body"></div>
    <a href="/chat" class="modal-cta" id="m-cta">Mit Coach üben →</a>
  </div>
</div>

<script>
const AREA_CFG = {
  prokrastination: { label:'Prokrastination', icon:'⏳', color:'#845ec2', bg:'#f5f0ff' },
  unterbrechungen: { label:'Unterbrechungen', icon:'🎯', color:'#118ab2', bg:'#e8f4ff' },
  leistung:        { label:'Leistung',        icon:'📚', color:'#e07b00', bg:'#fff5e0' },
  emotion:         { label:'Emotion',         icon:'💪', color:'#ff6b6b', bg:'#fff0f0' },
};

const TIPS = {
  prokrastination: [
    {e:'⚡', t:'<strong>Wenn-Dann-Plan:</strong> Lege exakt fest, was du tust wenn der Widerstand kommt – z.B. "Wenn ich zum Handy greife, mache ich 5 Min Karteikarten."'},
    {e:'📅', t:'<strong>Stoff verteilen:</strong> Zerlege großen Stoff in 25–45 Min Einheiten und plane realistisch mit 20% Puffer.'},
    {e:'🔚', t:'<strong>Shutdown-Ritual:</strong> Notiere am Ende jeder Session den kleinsten nächsten Schritt – macht den Start morgen 10× leichter.'},
  ],
  unterbrechungen: [
    {e:'📵', t:'<strong>Handy physisch entfernen:</strong> Aus dem Sichtfeld = bis zu 40% weniger kognitive Ablenkung, auch wenn es stumm ist.'},
    {e:'🗒️', t:'<strong>Ablenkungs-Parkplatz:</strong> Gedanken/Impulse kurz aufschreiben statt nachgehen – hält den Flow am Laufen.'},
    {e:'⏱️', t:'<strong>30-Min-Experiment:</strong> 30 Minuten fokussiert + 2 Min Review was abgelenkt hat = messbarer Lerneffekt.'},
  ],
  leistung: [
    {e:'🧪', t:'<strong>Prüfungssimulation:</strong> Regelmäßig unter echten Bedingungen üben – Auswertung danach ist wichtiger als die Simulation selbst.'},
    {e:'🗺️', t:'<strong>Struktur-Lege-Technik:</strong> Stoff als Mindmap/Gliederung statt passiv lesen – erzeugt bessere Abrufpfade.'},
    {e:'🎯', t:'<strong>Thema zergliedern:</strong> Teilfähigkeiten mit Mindestkriterien definieren – dann weißt du genau wann du "fertig" bist.'},
  ],
  emotion: [
    {e:'🌬️', t:'<strong>Verlängertes Ausatmen:</strong> 4s ein, 6–8s aus – beruhigt das Nervensystem in unter 2 Minuten nachweisbar.'},
    {e:'🏷️', t:'<strong>Emotion benennen:</strong> "Ich bin nervös (7/10)" statt "Ich bin schlecht" – Benennen reduziert die Intensität direkt.'},
    {e:'📈', t:'<strong>Kleine Expositionen:</strong> Regelmäßige Mini-Simulationen senken die Angstreaktivität dauerhaft – nicht vermeiden.'},
  ],
};

const username   = sessionStorage.getItem('username') || 'Gast';
const topAreas   = JSON.parse(sessionStorage.getItem('top_areas')    || '[]');
const methods    = JSON.parse(sessionStorage.getItem('selected_methods') || '[]');
const areaScores = JSON.parse(sessionStorage.getItem('area_scores')  || '{}');

// Header
document.getElementById('welcome-tag').textContent = `✨ Dein Lernprofil`;
document.getElementById('page-title').textContent  = `Hey ${username}! 👋`;

// Stats
if (topAreas[0]) {
  const cfg = AREA_CFG[topAreas[0]];
  document.getElementById('s-area').textContent = cfg?.icon + ' ' + (cfg?.label || topAreas[0]);
}
document.getElementById('s-methods').textContent = methods.length;
const scores = Object.values(areaScores);
if (scores.length) document.getElementById('s-avg').textContent = (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1);

// Area chart
const maxScore = 18; // 6 Fragen × max 3
document.getElementById('area-chart').innerHTML = Object.entries(areaScores)
  .sort((a,b)=>a[1]-b[1])
  .map(([area, score]) => {
    const cfg = AREA_CFG[area] || {label:area, icon:'📊', color:'#845ec2', bg:'#f5f0ff'};
    const pct = Math.round((score/maxScore)*100);
    const isTop = topAreas.includes(area);
    return `<div class="area-row">
      <div class="area-top">
        <span class="area-name-label">${cfg.icon} ${cfg.label}${isTop?' ⭐':''}</span>
        <span class="area-score-badge" style="background:${cfg.bg};color:${cfg.color};border:1.5px solid ${cfg.color}">${score}/30</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="background:${cfg.color};width:0%" data-w="${pct}%"></div>
      </div>
    </div>`;
  }).join('');

setTimeout(() => document.querySelectorAll('.bar-fill').forEach(el => el.style.width = el.dataset.w), 150);

// Methods
document.getElementById('methods-list').innerHTML = methods.map(m => {
  const cfg = AREA_CFG[m.kategorie] || {icon:'📌', color:'#845ec2', bg:'#f5f0ff', label:m.kategorie};
  return `<div class="method-row">
    <div class="mrow-icon" style="background:${cfg.bg};color:${cfg.color};border-color:${cfg.color}">${cfg.icon}</div>
    <div class="mrow-info">
      <div class="mrow-name">${m.name}</div>
      <div class="mrow-meta">${cfg.label} · ${m.dauer}</div>
    </div>
    <span class="mrow-badge" style="background:${cfg.bg};color:${cfg.color};border:1.5px solid ${cfg.color}">Empfohlen</span>
  </div>`;
}).join('');

// Tips
document.getElementById('tips').innerHTML = topAreas.slice(0,2)
  .flatMap(area => TIPS[area] || [])
  .map(t => `<div class="tip-row"><span class="tip-emoji">${t.e}</span><span class="tip-body">${t.t}</span></div>`)
  .join('');

// ── Alle Methoden laden ───────────────────────────────────────────────────────
let allMethods = [];
let activeFilter = 'all';

async function loadAllMethods() {
  try {
    const data = await fetch('/api/methods').then(r => r.json());
    allMethods = data.methods || [];
    renderGrid(allMethods);
  } catch(e) {
    document.getElementById('all-methods-grid').innerHTML =
      '<div style="color:var(--coral)">Fehler beim Laden der Methoden.</div>';
  }
}

function renderGrid(list) {
  const grid = document.getElementById('all-methods-grid');
  if (!list.length) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:.875rem">Keine Methoden gefunden.</div>';
    return;
  }
  grid.innerHTML = list.map((m, i) => {
    const cfg = AREA_CFG[m.kategorie] || {icon:'📌', color:'#845ec2', bg:'#f5f0ff', label:m.kategorie};
    const isRec = methods.some(r => r.name === m.name);
    return `<div class="method-tile" onclick="openModal(${i})" data-area="${m.kategorie}">
      <div class="tile-icon" style="background:${cfg.bg};color:${cfg.color};border-color:${cfg.color}">${cfg.icon}</div>
      <div class="tile-name">${m.name}</div>
      <div class="tile-meta">${cfg.label} · ${m.dauer || '?'}</div>
      ${isRec ? `<span class="tile-badge" style="background:${cfg.bg};color:${cfg.color};border:1.5px solid ${cfg.color}">⭐ Empfohlen</span>` : ''}
    </div>`;
  }).join('');
}

function filterMethods(area) {
  activeFilter = area;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-area="${area}"]`).classList.add('active');
  const filtered = area === 'all' ? allMethods : allMethods.filter(m => m.kategorie === area);
  renderGrid(filtered);
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(idx) {
  const filtered = activeFilter === 'all' ? allMethods : allMethods.filter(m => m.kategorie === activeFilter);
  const m = filtered[idx];
  if (!m) return;

  const cfg = AREA_CFG[m.kategorie] || {icon:'📌', color:'#845ec2', bg:'#f5f0ff', label:m.kategorie};

  document.getElementById('m-icon').textContent = cfg.icon;
  document.getElementById('m-icon').style.background = cfg.bg;
  document.getElementById('m-icon').style.borderColor = cfg.color;
  document.getElementById('m-title').textContent = m.name;
  document.getElementById('m-subtitle').innerHTML =
    `<span style="color:${cfg.color};font-weight:700">${cfg.label}</span> · ${m.dauer || '?'}`;

  let body = '';

  if (m.kurzbeschreibung) body += `
    <div class="modal-section">
      <div class="modal-section-title">Beschreibung</div>
      <p>${m.kurzbeschreibung}</p>
    </div>`;

  if (m.ziel) body += `
    <div class="modal-section">
      <div class="modal-section-title">🎯 Ziel</div>
      <p>${m.ziel}</p>
    </div>`;

  if (m.schritte?.length) body += `
    <div class="modal-section">
      <div class="modal-section-title">📋 Schritte</div>
      <div class="modal-steps">
        ${m.schritte.map((s,i) => `
          <div class="modal-step">
            <div class="step-num" style="background:${cfg.color};border-color:${cfg.color}">${i+1}</div>
            <div class="step-text">${s}</div>
          </div>`).join('')}
      </div>
    </div>`;

  if (m.tipps?.length) body += `
    <div class="modal-section">
      <div class="modal-section-title">💡 Tipps</div>
      <ul>${m.tipps.map(t => `<li>${t}</li>`).join('')}</ul>
    </div>`;

  if (m.haeufige_fehler?.length) body += `
    <div class="modal-section">
      <div class="modal-section-title">⚠️ Häufige Fehler</div>
      <ul>${m.haeufige_fehler.map(f => `<li>${f}</li>`).join('')}</ul>
    </div>`;

  if (m.beispiel) body += `
    <div class="modal-section">
      <div class="modal-section-title">📖 Beispiel</div>
      <p style="background:${cfg.bg};border:1.5px solid ${cfg.color};border-radius:10px;padding:.75rem 1rem">${m.beispiel}</p>
    </div>`;

  document.getElementById('m-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

loadAllMethods();</script>
</body>

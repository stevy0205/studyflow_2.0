<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyFlow – Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:  #fdf8f0;
      --yellow: #ffd60a;
      --coral:  #ff6b6b;
      --mint:   #06d6a0;
      --blue:   #118ab2;
      --purple: #845ec2;
      --navy:   #1a1a2e;
      --ink:    #2d2d2d;
      --muted:  #7a7a8c;
      --white:  #ffffff;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--ink);
      height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--white);
      border-right: 3px solid var(--navy);
      display: flex; flex-direction: column;
      padding: 1.5rem 1.25rem;
      overflow-y: auto;
    }

    .logo {
      font-family: 'Cabin Sketch', cursive;
      font-size: 1.4rem; font-weight: 700;
      margin-bottom: 2rem;
    }

    .sidebar-section { margin-bottom: 1.75rem; }

    .sidebar-label {
      font-size: .7rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted); margin-bottom: .75rem;
      display: flex; align-items: center; gap: .4rem;
    }

    /* Area score pills */
    .area-pill {
      display: flex; align-items: center; justify-content: space-between;
      padding: .6rem .85rem;
      border-radius: 10px;
      border: 2px solid transparent;
      margin-bottom: .4rem;
      font-size: .85rem; font-weight: 700;
      transition: transform .15s;
    }
    .area-pill:hover { transform: translateX(3px); }

    .pill-bar {
      display: flex; align-items: center; gap: .5rem;
    }
    .pill-track {
      width: 60px; height: 5px;
      background: rgba(0,0,0,.08); border-radius: 99px; overflow: hidden;
    }
    .pill-fill {
      height: 100%; border-radius: 99px;
      transition: width 1s ease;
    }
    .pill-score { font-size: .75rem; color: var(--muted); }

    /* Method chips */
    .method-chip {
      display: flex; align-items: flex-start; gap: .6rem;
      padding: .75rem; border-radius: 10px;
      margin-bottom: .5rem; cursor: pointer;
      border: 2px solid #e8e5de;
      background: var(--cream);
      transition: all .15s;
    }
    .method-chip:hover { border-color: var(--navy); transform: translateX(3px); }
    .method-chip.active {
      border-color: var(--navy);
      background: var(--white);
      box-shadow: 3px 3px 0 var(--navy);
    }
    .chip-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; flex-shrink: 0;
    }
    .chip-text { flex: 1; min-width: 0; }
    .chip-name {
      font-size: .82rem; font-weight: 800;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chip-cat { font-size: .7rem; color: var(--muted); }

    /* Sidebar footer */
    .sidebar-footer {
      margin-top: auto; padding-top: 1rem;
      border-top: 2px solid #e8e5de;
    }
    .user-row {
      display: flex; align-items: center; gap: .75rem; padding: .4rem .25rem;
    }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; font-weight: 800; flex-shrink: 0;
      border: 2.5px solid var(--navy);
    }
    .user-name { font-size: .875rem; font-weight: 800; }
    .user-type { font-size: .7rem; color: var(--muted); }

    .btn-dashboard {
      display: flex; align-items: center; gap: .4rem;
      width: 100%; margin-top: .75rem; padding: .55rem .75rem;
      background: var(--yellow); color: var(--navy);
      border: 2px solid var(--navy); border-radius: 8px;
      font-family: 'Nunito', sans-serif; font-size: .8rem; font-weight: 800;
      cursor: pointer; text-decoration: none;
      transition: all .15s;
      box-shadow: 2px 2px 0 var(--navy);
    }
    .btn-dashboard:hover {
      transform: translate(-1px,-1px);
      box-shadow: 3px 3px 0 var(--navy);
    }

    /* ── Chat ── */
    .chat-wrap {
      display: flex; flex-direction: column; overflow: hidden;
    }

    .chat-header {
      padding: 1rem 1.5rem;
      background: var(--white);
      border-bottom: 3px solid var(--navy);
      display: flex; align-items: center; justify-content: space-between;
    }

    .coach-info { display: flex; align-items: center; gap: .75rem; }

    .coach-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--yellow); border: 2.5px solid var(--navy);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }

    .coach-name {
      font-family: 'Cabin Sketch', cursive;
      font-size: 1.2rem; color: var(--navy);
    }
    .coach-status { font-size: .75rem; color: var(--mint); font-weight: 700; }

    .header-actions { display: flex; gap: .5rem; }
    .hdr-btn {
      padding: .4rem .85rem; border: 2px solid var(--navy);
      border-radius: 8px; background: transparent;
      font-family: 'Nunito', sans-serif; font-size: .78rem; font-weight: 700;
      cursor: pointer; color: var(--navy); text-decoration: none;
      transition: all .1s;
    }
    .hdr-btn:hover { background: var(--navy); color: var(--white); }

    /* Messages */
    .messages {
      flex: 1; overflow-y: auto; padding: 1.5rem;
      display: flex; flex-direction: column; gap: 1.25rem;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #d0cdc5; border-radius: 2px; }

    .msg { display: flex; gap: .75rem; max-width: 82%; animation: msgIn .25s ease; }
    @keyframes msgIn {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem; margin-top: 2px;
      border: 2px solid var(--navy);
    }
    .msg.bot  .msg-avatar { background: var(--yellow); }
    .msg.user .msg-avatar { background: var(--mint); }

    .msg-bubble {
      padding: .9rem 1.15rem; border-radius: 16px;
      font-size: .9rem; line-height: 1.65;
      border: 2px solid var(--navy);
    }
    .msg.bot .msg-bubble {
      background: var(--white);
      border-top-left-radius: 4px;
      box-shadow: 3px 3px 0 #d0cdc5;
    }
    .msg.user .msg-bubble {
      background: var(--navy); color: var(--white);
      border-top-right-radius: 4px;
      box-shadow: 3px 3px 0 rgba(26,26,46,.3);
    }

    .msg-bubble strong { font-weight: 800; }

    /* Quick replies */
    .quick-wrap {
      padding: .5rem 1.5rem 1rem;
      display: flex; flex-wrap: wrap; gap: .5rem;
    }
    .qr-btn {
      padding: .4rem .95rem;
      border: 2px solid var(--navy); border-radius: 999px;
      background: var(--white); color: var(--navy);
      font-family: 'Nunito', sans-serif; font-size: .8rem; font-weight: 700;
      cursor: pointer; transition: all .12s;
    }
    .qr-btn:hover {
      background: var(--yellow);
      box-shadow: 2px 2px 0 var(--navy);
      transform: translate(-1px,-1px);
    }

    /* Input */
    .input-area {
      padding: 1rem 1.5rem;
      background: var(--white);
      border-top: 3px solid var(--navy);
      display: flex; gap: .75rem; align-items: flex-end;
    }
    .input-box {
      flex: 1; background: var(--cream);
      border: 2.5px solid #d0cdc5; border-radius: 12px;
      padding: .75rem 1rem; color: var(--ink);
      font-family: 'Nunito', sans-serif; font-size: .9rem;
      resize: none; outline: none;
      min-height: 46px; max-height: 120px;
      transition: border-color .15s; line-height: 1.5;
    }
    .input-box:focus { border-color: var(--navy); }
    .input-box::placeholder { color: var(--muted); }

    .send-btn {
      width: 46px; height: 46px; border-radius: 10px;
      background: var(--navy); border: 2px solid var(--navy);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 3px 3px 0 var(--coral);
      transition: all .1s;
    }
    .send-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--coral); }
    .send-btn svg { width: 18px; height: 18px; fill: var(--white); }

    /* Typing */
    .typing {
      display: flex; gap: 5px; padding: .6rem .8rem;
      background: var(--white);
      border: 2px solid var(--navy);
      border-radius: 12px; border-top-left-radius: 4px;
      width: fit-content;
      box-shadow: 3px 3px 0 #d0cdc5;
    }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); animation: bob .9s infinite;
    }
    .typing span:nth-child(2) { animation-delay:.15s; }
    .typing span:nth-child(3) { animation-delay:.3s; }
    @keyframes bob {
      0%,60%,100% { transform:translateY(0); }
      30%          { transform:translateY(-6px); }
    }

    @media (max-width: 768px) {
      body { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="logo">StudyFlow</div>

  <div class="sidebar-section">
    <div class="sidebar-label">📊 Deine Bereiche</div>
    <div id="area-pills"></div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">🎯 Methoden</div>
    <div id="methods-chips"></div>
  </div>

  <div class="sidebar-footer">
    <div class="user-row">
      <div class="avatar" id="user-avatar" style="background:var(--yellow)">?</div>
      <div>
        <div class="user-name" id="user-name-disp">Gast</div>
        <div class="user-type" id="user-type-disp">Gast-Session</div>
      </div>
    </div>
    <a href="/dashboard" class="btn-dashboard">📈 Dashboard ansehen</a>
  </div>
</div>

<!-- Chat -->
<div class="chat-wrap">
  <div class="chat-header">
    <div class="coach-info">
      <div class="coach-avatar">🎓</div>
      <div>
        <div class="coach-name">StudyFlow Coach</div>
        <div class="coach-status">● Online</div>
      </div>
    </div>
    <div class="header-actions">
      <a href="/dashboard" class="hdr-btn">Dashboard</a>
      <a href="/" class="hdr-btn">Abmelden</a>
    </div>
  </div>

  <div class="messages" id="messages"></div>
  <div class="quick-wrap" id="quick-replies"></div>

  <div class="input-area">
    <textarea class="input-box" id="input"
      placeholder="Frage stellen oder Feedback geben..."
      rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const AREA_CFG = {
  prokrastination: { label:'Prokrastination', icon:'⏳', color:'#845ec2', bg:'#f5f0ff' },
  unterbrechungen: { label:'Unterbrechungen', icon:'🎯', color:'#118ab2', bg:'#e8f4ff' },
  leistung:        { label:'Leistung',        icon:'📚', color:'#e07b00', bg:'#fff5e0' },
  emotion:         { label:'Emotion',         icon:'💪', color:'#ff6b6b', bg:'#fff0f0' },
};

const threadId    = sessionStorage.getItem('thread_id');
const username    = sessionStorage.getItem('username') || 'Gast';
const isLoggedIn  = sessionStorage.getItem('is_logged_in') === 'true';
const topAreas    = JSON.parse(sessionStorage.getItem('top_areas')    || '[]');
const methods     = JSON.parse(sessionStorage.getItem('selected_methods') || '[]');
const areaScores  = JSON.parse(sessionStorage.getItem('area_scores')  || '{}');
const introMsg    = sessionStorage.getItem('intro_message') || '';

// User
document.getElementById('user-name-disp').textContent = username;
document.getElementById('user-type-disp').textContent = isLoggedIn ? 'Eingeloggt' : 'Gast';
const av = document.getElementById('user-avatar');
av.textContent = username[0]?.toUpperCase() || '?';
av.style.background = topAreas[0] ? AREA_CFG[topAreas[0]]?.bg || '#ffd60a' : '#ffd60a';

// Area pills
const maxScore = 18; // 6 Fragen × max 3
document.getElementById('area-pills').innerHTML = Object.entries(areaScores)
  .sort((a,b)=>a[1]-b[1])
  .map(([area, score]) => {
    const cfg = AREA_CFG[area] || {label:area, icon:'📊', color:'#845ec2', bg:'#f5f0ff'};
    const pct = Math.round((score/maxScore)*100);
    const isTop = topAreas.includes(area);
    return `<div class="area-pill" style="background:${cfg.bg};border-color:${isTop?cfg.color:'transparent'}">
      <span>${cfg.icon} ${cfg.label}${isTop?' ⭐':''}</span>
      <div class="pill-bar">
        <div class="pill-track"><div class="pill-fill" style="background:${cfg.color};width:0%" data-w="${pct}%"></div></div>
        <span class="pill-score">${score}</span>
      </div>
    </div>`;
  }).join('');
setTimeout(() => document.querySelectorAll('.pill-fill').forEach(el => el.style.width = el.dataset.w), 200);

// Method chips
document.getElementById('methods-chips').innerHTML = methods.map((m,i) => {
  const cfg = AREA_CFG[m.kategorie] || {icon:'📌', color:'#845ec2', bg:'#f5f0ff'};
  return `<div class="method-chip ${i===0?'active':''}" onclick="selectMethod(${i})">
    <div class="chip-icon" style="background:${cfg.bg};color:${cfg.color}">${cfg.icon}</div>
    <div class="chip-text">
      <div class="chip-name">${m.name}</div>
      <div class="chip-cat">${cfg.label||m.kategorie} · ${m.dauer}</div>
    </div>
  </div>`;
}).join('');

// ── Messages ─────────────────────────────────────────────────────────────────
function addMessage(text, role='bot') {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  const avi = role==='bot' ? '🎓' : (username[0]?.toUpperCase()||'?');
  el.innerHTML = `<div class="msg-avatar">${avi}</div>
    <div class="msg-bubble">${fmt(text)}</div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function fmt(t) {
  return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
          .replace(/\*(.*?)\*/g,'<em>$1</em>')
          .replace(/\n/g,'<br>');
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.className='msg bot'; el.id='typing';
  el.innerHTML=`<div class="msg-avatar">🎓</div>
    <div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(el); msgs.scrollTop=msgs.scrollHeight;
}
function removeTyping() { const t=document.getElementById('typing'); if(t) t.remove(); }

function setQR(replies) {
  document.getElementById('quick-replies').innerHTML = replies.map(r =>
    `<button class="qr-btn" onclick="sendQuick('${r}')">${r}</button>`).join('');
}

// ── Session Phase State ───────────────────────────────────────────────────────
let sessionPhase   = 'method_selection'; // method_selection | method_detail | session_active
let chosenMethod   = null;

// ── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (introMsg) {
    addMessage(introMsg, 'bot');
  } else if (methods.length >= 2) {
    const m1=methods[0], m2=methods[1];
    const c1=AREA_CFG[m1.kategorie], c2=AREA_CFG[m2.kategorie];
    addMessage(
      `Hey! Ich habe deinen Fragebogen ausgewertet. 🎉\n\nHier sind deine **2 empfohlenen Methoden**:\n\n` +
      `**1. ${m1.name}** ${c1?.icon||''}  (${m1.dauer||''})\n${m1.kurzbeschreibung}\n\n` +
      `**2. ${m2.name}** ${c2?.icon||''}  (${m2.dauer||''})\n${m2.kurzbeschreibung}\n\n` +
      `Tippe **1** oder **2** zum Auswählen, oder stelle eine Frage! 💬`, 'bot');
  }
  setQR(['Methode 1', 'Methode 2', 'Erkläre Methode 1', 'Erkläre Methode 2']);
});

// ── Send ─────────────────────────────────────────────────────────────────────
async function sendMessage() {
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  inp.value=''; inp.style.height='auto';
  document.getElementById('quick-replies').innerHTML='';
  showTyping();
  try {
    const data = await fetch('/api/chat',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        message: text,
        thread_id: threadId,
        session_phase: sessionPhase,
        selected_methods: methods,
        chosen_method: chosenMethod,
      })
    }).then(r=>r.json());
    removeTyping();
    addMessage(data.reply, 'bot');
    // Phase und chosen_method vom Server übernehmen
    if (data.new_phase) sessionPhase = data.new_phase;
    if (data.chosen_method) chosenMethod = data.chosen_method;
    updateQR(data.reply, sessionPhase);
  } catch(e) {
    removeTyping();
    addMessage('Verbindungsfehler – bitte neu laden.', 'bot');
  }
}

function sendQuick(text) {
  // Normalisiere: "Methode 1" → "1", "Methode 2" → "2"
  const normalized = text.replace(/^methode\s*1$/i, '1').replace(/^methode\s*2$/i, '2');
  document.getElementById('input').value = normalized;
  sendMessage();
}

function selectMethod(idx) {
  document.querySelectorAll('.method-chip').forEach((c,i) => c.classList.toggle('active', i===idx));
  sendQuick(String(idx+1));
}

function updateQR(reply, phase) {
  const l = reply.toLowerCase();
  if (phase === 'method_detail') {
    setQR(['Starten 🚀', 'Noch eine Frage', 'Andere Methode']);
  } else if (phase === 'session_active') {
    if (l.includes('wiederholen') || l.includes('nächste methode') || l.includes('beenden')) {
      setQR(['Wiederholen 🔁', 'Nächste Methode ➡️', 'Beenden ✅']);
    } else {
      // Feedback abfragen
      setQR(['Super! 🌟', 'Teilweise gut 👍', 'Neutral 😐', 'Eher nicht 👎', 'Hat nicht gepasst ❌']);
    }
  } else {
    setQR(['Methode 1', 'Methode 2', 'Erkläre Methode 1', 'Erkläre Methode 2']);
  }
}

function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
</script>
</body>
</html>
